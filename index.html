// ---- Database helpers (Supabase — shared live storage) -----
// Each client is one row: { id, data (jsonb), updated_at }.
// Per-client writes mean two coaches editing different clients
// won't overwrite each other.

async function dbLoadAll() {
  const { data, error } = await sb.from("roster").select("id, data");
  if (error) { console.error("load failed", error); throw error; }
  return (data || []).map((row) => row.data);
}

async function dbUpsertClient(client) {
  const { error } = await sb
    .from("roster")
    .upsert({ id: client.id, data: client, updated_at: new Date().toISOString() });
  if (error) console.error("save failed", error);
}

async function dbDeleteClient(id) {
  const { error } = await sb.from("roster").delete().eq("id", id);
  if (error) console.error("delete failed", error);
}

// ============================================================
//  PASSWORD GATE
// ============================================================
function Gate({ onUnlock }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  function submit() {
    if (pw === APP_PASSWORD) { onUnlock(); }
    else { setErr(true); setPw(""); }
  }
  return (
    <div style={{ ...wrap, display: "grid", placeItems: "center", minHeight: "100vh", background: "#f4f4f5" }}>
      <div style={{
        background: "#fff", border: "1px solid #e6e6e8", borderRadius: 16,

          CLIENT PROGRESS CRM
        </div>
        <input
          type="password"
          value={pw}
          autoFocus
          onChange={(e) => { setPw(e.target.value); setErr(false); }}
          onKeyDown={(e) => e.key === "Enter" && submit()}
          placeholder="Enter password"
          style={{ ...search, width: "100%", textAlign: "center", marginTop: 22, marginBottom: 6 }}
        />
        {err && <div style={{ color: "#b00020", fontSize: 12.5, margin: "4px 0" }}>Incorrect password.</div>}
        <button onClick={submit} style={{ ...primaryBtn, width: "100%", marginTop: 12, padding: "11px 16px" }}>
          Enter
        </button>
      </div>
    </div>
  );
}

// ============================================================
//  MAIN APP
// ============================================================
function App() {
  const [authed, setAuthed] = useState(false);
  const [roster, setRoster] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [loadError, setLoadError] = useState(null);
  const [view, setView] = useState("dashboard");
  const [activeId, setActiveId] = useState(null);
  const [query, setQuery] = useState("");
  const [filterLevel, setFilterLevel] = useState("All");
  const [editing, setEditing] = useState(false);
  const [syncing, setSyncing] = useState(false);

  // Initial load from the shared database (after login)
  useEffect(() => {
    if (!authed) return;
    (async () => {
      try {
        let data = await dbLoadAll();
        if (!data || data.length === 0) {
          // First ever run: seed the shared database once.
          for (const c of SEED) await dbUpsertClient(c);
          data = SEED;
        }
        setRoster(data);
        setLoaded(true);
      } catch (e) {
        setLoadError("Could not reach the database. Check your internet connection and refresh.");
      }
    })();
  }, [authed]);

  // Light polling so coaches see each other's changes (every 12s).
  // Skipped while a profile is open for editing to avoid clobbering typing.
  useEffect(() => {
    if (!authed || !loaded) return;
    const t = setInterval(async () => {
      if (editing) return;
      try {
        const data = await dbLoadAll();
        setRoster(data);
      } catch (e) { /* transient network issue; ignore */ }
    }, 12000);
    return () => clearInterval(t);
  }, [authed, loaded, editing]);

  const active = roster.find((c) => c.id === activeId) || null;

  // Update local state immediately (snappy UI) + persist that client to DB.
  function updateClient(id, patch) {
    setRoster((r) => {
      const next = r.map((c) => (c.id === id ? { ...c, ...patch } : c));
      const changed = next.find((c) => c.id === id);
      if (changed) {
        setSyncing(true);
        dbUpsertClient(changed).finally(() => setSyncing(false));
      }
      return next;
    });
  }
  function addClient() {
    const c = newClient({ name: "New Client" });
    setRoster((r) => [c, ...r]);
    dbUpsertClient(c);
    setActiveId(c.id);
    setView("profile");
    setEditing(true);
  }
  function deleteClient(id) {
    setRoster((r) => r.filter((c) => c.id !== id));
    dbDeleteClient(id);
    setView("clients");
    setActiveId(null);
  }

  const filtered = useMemo(() => {
    return roster
      .filter((c) => filterLevel === "All" || c.level === filterLevel)
      .filter((c) => c.name.toLowerCase().includes(query.toLowerCase()))
      .sort((a, b) => a.name.localeCompare(b.name));
  }, [roster, query, filterLevel]);

  // ---- Password gate ----
  if (!authed) {
    return <Gate onUnlock={() => setAuthed(true)} />;
  }

  if (loadError) {
    return (
      <div style={{ ...wrap, display: "grid", placeItems: "center", minHeight: 400 }}>
        <div style={{ textAlign: "center", color: "#b00020", fontFamily: "'Inter',sans-serif", maxWidth: 360, padding: 20 }}>
          <Logo size={56} />
          <div style={{ marginTop: 16, fontWeight: 600 }}>{loadError}</div>
          <button onClick={() => window.location.reload()} style={{ ...primaryBtn, marginTop: 16 }}>Retry</button>
        </div>
      </div>
    );
  }

  if (!loaded) {
    return (
      <div style={{ ...wrap, display: "grid", placeItems: "center", minHeight: 400 }}>
        <div style={{ textAlign: "center", color: "#888", fontFamily: "'Oswald',sans-serif", letterSpacing: ".1em" }}>
          <Logo size={56} />
          <div style={{ marginTop: 12 }}>LOADING ROSTER…</div>
        </div>
      </div>
    );
  }

  return (
    <div style={wrap}>
      <header style={header}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <Logo />
          <div>
            <div style={brandTitle}>DEFENCE &amp; ATHLETICS</div>
            <div style={brandSub}>CLIENT PROGRESS CRM · DUBAI</div>
          </div>
        </div>
        <nav style={{ display: "flex", gap: 4 }}>
          {[["dashboard", "Dashboard"], ["clients", "Clients"], ["classes", "Classes"]].map(([k, label]) => (
            <button key={k} onClick={() => { setView(k); setActiveId(null); }} style={navBtn(view === k)}>
              {label}
            </button>
          ))}
        </nav>
      </header>

      <main style={{ padding: "22px 26px 40px" }}>
        {view === "dashboard" && <Dashboard roster={roster} go={(id) => { setActiveId(id); setView("profile"); }} />}
        {view === "clients" && (
          <ClientsView
            list={filtered} query={query} setQuery={setQuery}
            filterLevel={filterLevel} setFilterLevel={setFilterLevel}
            onOpen={(id) => { setActiveId(id); setView("profile"); setEditing(false); }}
            onAdd={addClient}
          />
        )}
        {view === "profile" && active && (
          <Profile
            client={active} editing={editing} setEditing={setEditing}
            onChange={(patch) => updateClient(active.id, patch)}
            onBack={() => { setView("clients"); setActiveId(null); }}
            onDelete={() => deleteClient(active.id)}
          />
        )}
        {view === "classes" && (
          <ClassesView
            roster={roster}
            onLogAttendance={(clientIds, className) => {
              clientIds.forEach((clientId) => {
                const c = roster.find((x) => x.id === clientId);
                if (!c) return;
                const used = Math.min(c.planTotal, (c.planUsed || 0) + 1);
                updateClient(clientId, { planUsed: used });
              });
            }}
          />
        )}
      </main>

      <footer style={footer}>
        {syncing ? "Saving…" : "Saved to shared database"} · {roster.length} client{roster.length !== 1 ? "s" : ""} on roster · live across all devices
      </footer>
    </div>
  );
}

// ============================================================
//  CLASSES + ATTENDANCE  (fixed weekly grid)
// ============================================================
function ClassesView({ roster, onLogAttendance }) {
  const [openClass, setOpenClass] = useState(null); // {day, time, name} or null

  if (openClass) {
    return (
      <ClassRegister
        roster={roster}
        klass={openClass}
        onBack={() => setOpenClass(null)}
        onLogAttendance={onLogAttendance}
      />
    );
  }

  // Group the schedule by day for the weekly grid.
  const byDay = [1, 2, 3, 4, 5, 6, 0].map((day) => ({
    day,
    slots: CLASS_SCHEDULE.filter((c) => c.day === day).sort((a, b) => a.time.localeCompare(b.time)),
  }));

  return (
    <div>
      <SectionTitle>Weekly Class Schedule</SectionTitle>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {byDay.map(({ day, slots }) => (
          <div key={day} style={{
            display: "flex", alignItems: "center", gap: 16,
            background: "#fff", border: "1px solid #e6e6e8", borderRadius: 12, padding: "14px 18px",
          }}>
            <div style={{
              width: 64, fontFamily: "'Oswald',sans-serif", fontWeight: 700, fontSize: 16,
              letterSpacing: ".06em", color: "#111", textTransform: "uppercase",
            }}>{DAY_NAMES[day]}</div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {slots.length === 0 ? (
                <span style={{ color: "#bbb", fontSize: 13 }}>No classes</span>
              ) : slots.map((c) => (
                <button
                  key={c.time}
                  onClick={() => setOpenClass(c)}
                  className="da-clientcard"
                  style={{
                    display: "flex", flexDirection: "column", alignItems: "center",
                    border: "1.5px solid #111", borderRadius: 10, background: "#fff",
                    padding: "8px 18px", cursor: "pointer", minWidth: 92,
                  }}>
                  <span style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 700, fontSize: 19 }}>{c.time}</span>
                  <span style={{ fontSize: 10.5, color: "#888", textTransform: "uppercase", letterSpacing: ".06em" }}>{c.name}</span>
                </button>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{ fontSize: 11.5, color: "#999", marginTop: 16 }}>
        Tap a class time to take the register. Tick who attended, then tap “Log attendance” to add a
        session to each client’s plan.
      </div>
    </div>
  );
}

// Register for one weekly class slot.
function ClassRegister({ roster, klass, onBack, onLogAttendance }) {
  const [picked, setPicked] = useState([]); // client ids ticked this session
  const [query, setQuery] = useState("");
  const [done, setDone] = useState(false);

  function toggle(id) {
    setPicked((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);
  }
  function logAll() {
    if (picked.length === 0) return;
    onLogAttendance(picked, klass.name);
    setDone(true);
    setTimeout(() => { setPicked([]); setDone(false); }, 1600);
  }

  const sorted = [...roster].sort((a, b) => a.name.localeCompare(b.name));
  const list = sorted.filter((c) => c.name.toLowerCase().includes(query.toLowerCase()));

  return (
    <div>
      <button onClick={onBack} style={backBtn}>← Back to schedule</button>

      <div style={profileHead}>
        <div>
          <div style={{ fontSize: 26, fontWeight: 800, fontFamily: "'Oswald',sans-serif" }}>
            {DAY_FULL[klass.day]} · {klass.time}
          </div>
          <div style={{ fontSize: 12.5, color: "#888", marginTop: 4 }}>{klass.name} class register</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 800, fontSize: 30 }}>{picked.length}</div>
          <div style={{ fontSize: 11, color: "#999", textTransform: "uppercase", letterSpacing: ".08em" }}>ticked</div>
        </div>
      </div>

      <input placeholder="Search clients…" value={query} onChange={(e) => setQuery(e.target.value)}
        style={{ ...search, width: "100%", marginBottom: 14 }} />

      {list.length === 0 ? (
        <Empty>No clients found. Add clients on the Clients tab first.</Empty>
      ) : (
        <div style={card}>
          {list.map((c) => {
            const isIn = picked.includes(c.id);
            const left = c.planTotal - c.planUsed;
            return (
              <div key={c.id} style={{ ...skillRow, cursor: "pointer" }} onClick={() => toggle(c.id)}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{
                    width: 24, height: 24, borderRadius: 6, flexShrink: 0,
                    border: `2px solid ${isIn ? "#111" : "#ccc"}`,
                    background: isIn ? "#111" : "#fff",
                    display: "grid", placeItems: "center",
                  }}>
                    {isIn && (
                      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#fff" strokeWidth="3">
                        <path d="M5 13l4 4L19 7" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                    )}
                  </div>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14.5 }}>{c.name}</div>
                    <div style={{ fontSize: 11.5, color: left <= 2 ? "#b00020" : "#999" }}>
                      {c.plan} · {left <= 0 ? "no sessions left" : `${left} left`}
                    </div>
                  </div>
                </div>
                <LevelBadge level={c.level} small />
              </div>
            );
          })}
        </div>
      )}

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 16 }}>
        <button onClick={logAll} style={{ ...primaryBtn, opacity: picked.length === 0 ? 0.45 : 1 }}>
          Log attendance ({picked.length})
        </button>
        {done && <span style={{ color: "#1a7f37", fontWeight: 600, fontSize: 13.5 }}>✓ Sessions logged</span>}
      </div>
      <div style={{ fontSize: 11.5, color: "#999", marginTop: 10 }}>
        “Log attendance” adds one session to each ticked client’s plan, then clears the register for next time.
      </div>
    </div>
  );
}

// ============================================================
//  DASHBOARD
// ============================================================
function Dashboard({ roster, go }) {
  const total = roster.length;
  const byLevel = LEVELS.map((l) => ({ l, n: roster.filter((c) => c.level === l).length }));
  const sessionsLeft = roster.reduce((s, c) => s + Math.max(0, c.planTotal - c.planUsed), 0);
  const lowPlan = roster.filter((c) => c.planTotal - c.planUsed <= 2 && c.planTotal - c.planUsed >= 0);
  const avgSkill =
    total === 0 ? 0 :
    roster.reduce((s, c) => {
      const v = Object.values(c.skills);
      return s + (v.reduce((a, b) => a + b, 0) / (v.length * 5));
    }, 0) / total * 100;

  return (
    <div>
      <SectionTitle>Overview</SectionTitle>
      <div style={statGrid}>
        <Stat big label="Active Clients" value={total} />
        <Stat label="Sessions Remaining" value={sessionsLeft} />
        <Stat label="Avg. Skill Mastery" value={`${avgSkill.toFixed(0)}%`} />
        <Stat label="Plans Running Low" value={lowPlan.length} accent={lowPlan.length > 0} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 18, marginTop: 22 }}>
        <Card title="Level Distribution">
          {byLevel.map(({ l, n }) => (
            <div key={l} style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, alignItems: "center" }}>
                <LevelBadge level={l} small />
                <span style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 600 }}>{n}</span>
              </div>
              <Bar pct={total ? (n / total) * 100 : 0} />
            </div>
          ))}
        </Card>

        <Card title="Needs Attention — Plans Running Low">
          {lowPlan.length === 0 ? (
            <Empty>All clients have sessions remaining.</Empty>
          ) : (
            lowPlan.map((c) => {
              const left = c.planTotal - c.planUsed;
              return (
                <button key={c.id} onClick={() => go(c.id)} className="da-attention" style={attentionRow}>
                  <div>
                    <div style={{ fontWeight: 600 }}>{c.name}</div>
                    <div style={{ fontSize: 12, color: "#777" }}>{c.plan}</div>
                  </div>
                  <span style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 700, color: left <= 0 ? "#b00020" : "#111" }}>
                    {left <= 0 ? "EXPIRED" : `${left} left`}
                  </span>
                </button>
              );
            })
          )}
        </Card>
      </div>
    </div>
  );
}

// ============================================================
//  CLIENTS LIST
// ============================================================
function ClientsView({ list, query, setQuery, filterLevel, setFilterLevel, onOpen, onAdd }) {
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <SectionTitle>Roster</SectionTitle>
        <button onClick={onAdd} style={primaryBtn}>+ Add Client</button>
      </div>

      <div style={{ display: "flex", gap: 10, margin: "8px 0 18px", flexWrap: "wrap" }}>
        <input placeholder="Search by name…" value={query} onChange={(e) => setQuery(e.target.value)} style={search} />
        <select value={filterLevel} onChange={(e) => setFilterLevel(e.target.value)} style={select}>
          {["All", ...LEVELS].map((l) => <option key={l}>{l}</option>)}
        </select>
      </div>

      {list.length === 0 ? (
        <Empty>No clients match. Add one to get started.</Empty>
      ) : (
        <div style={cardGrid}>
          {list.map((c) => {
            const left = c.planTotal - c.planUsed;
            const pct = c.planTotal ? (c.planUsed / c.planTotal) * 100 : 0;
            const mastery = Object.values(c.skills).reduce((a, b) => a + b, 0) / (SKILL_AREAS.length * 5) * 100;
            return (
              <button key={c.id} onClick={() => onOpen(c.id)} className="da-clientcard" style={clientCard}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                    <div style={avatar}>{initials(c.name)}</div>
                    <div style={{ textAlign: "left" }}>
                      <div style={{ fontWeight: 700, fontSize: 16 }}>{c.name}</div>
                      <div style={{ fontSize: 12, color: "#777" }}>{c.plan}</div>
                    </div>
                  </div>
                  <LevelBadge level={c.level} small />
                </div>

                <div style={{ marginTop: 16 }}>
                  <div style={miniLabel}>
                    <span>Plan usage</span>
                    <span style={{ color: left <= 2 ? "#b00020" : "#444", fontWeight: 600 }}>
                      {c.planUsed}/{c.planTotal} · {left <= 0 ? "expired" : `${left} left`}
                    </span>
                  </div>
                  <Bar pct={pct} danger={left <= 2} />
                </div>

                <div style={{ marginTop: 12 }}>
                  <div style={miniLabel}>
                    <span>Skill mastery</span>
                    <span style={{ fontWeight: 600 }}>{mastery.toFixed(0)}%</span>
                  </div>
                  <Bar pct={mastery} />
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============================================================
//  CLIENT PROFILE
// ============================================================
function Profile({ client, editing, setEditing, onChange, onBack, onDelete }) {
  const [logText, setLogText] = useState("");
  const left = client.planTotal - client.planUsed;
  const mastery = Object.values(client.skills).reduce((a, b) => a + b, 0) / (SKILL_AREAS.length * 5) * 100;
  const [confirmDel, setConfirmDel] = useState(false);

  function setSkill(area, val) { onChange({ skills: { ...client.skills, [area]: val } }); }
  function logSession(delta) {
    const used = Math.max(0, Math.min(client.planTotal, client.planUsed + delta));
    onChange({ planUsed: used });
  }
  function addLog() {
    if (!logText.trim()) return;
    const entry = { date: new Date().toISOString().slice(0, 10), text: logText.trim() };
    onChange({ log: [entry, ...client.log] });
    setLogText("");
  }

  return (
    <div>
      <button onClick={onBack} style={backBtn}>← Back to roster</button>

      <div style={profileHead}>
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <div style={{ ...avatar, width: 60, height: 60, fontSize: 22 }}>{initials(client.name)}</div>
          <div>
            {editing ? (
              <input value={client.name} onChange={(e) => onChange({ name: e.target.value })}
                style={{ ...search, fontSize: 22, fontWeight: 700, width: 280 }} />
            ) : (
              <div style={{ fontSize: 26, fontWeight: 800, fontFamily: "'Oswald',sans-serif", letterSpacing: ".01em" }}>
                {client.name}
              </div>
            )}
            <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 10 }}>
              <LevelBadge level={client.level} />
              <span style={{ fontSize: 12, color: "#888" }}>Member since {client.joined}</span>
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => setEditing(!editing)} style={editing ? primaryBtn : ghostBtn}>
            {editing ? "Done" : "Edit"}
          </button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1.3fr", gap: 18, marginTop: 8 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          <Card title="Details">
            <Field label="Phone" editing={editing} value={client.phone} onChange={(v) => onChange({ phone: v })} />
            <Field label="Email" editing={editing} value={client.email} onChange={(v) => onChange({ email: v })} />
            <div style={fieldRow}>
              <span style={fieldLabel}>Level</span>
              {editing ? (
                <select value={client.level} onChange={(e) => onChange({ level: e.target.value })} style={select}>
                  {LEVELS.map((l) => <option key={l}>{l}</option>)}
                </select>
              ) : <LevelBadge level={client.level} small />}
            </div>
          </Card>

          <Card title="Plan Usage">
            {editing ? (
              <>
                <div style={fieldRow}>
                  <span style={fieldLabel}>Plan</span>
                  <select value={client.plan} onChange={(e) => onChange({ plan: e.target.value })} style={select}>
                    {PLAN_TYPES.map((p) => <option key={p}>{p}</option>)}
                  </select>
                </div>
                <div style={fieldRow}>
                  <span style={fieldLabel}>Total sessions</span>
                  <input type="number" min="0" value={client.planTotal}
                    onChange={(e) => onChange({ planTotal: +e.target.value || 0 })} style={{ ...search, width: 80 }} />
                </div>
                <div style={fieldRow}>
                  <span style={fieldLabel}>Used</span>
                  <input type="number" min="0" value={client.planUsed}
                    onChange={(e) => onChange({ planUsed: +e.target.value || 0 })} style={{ ...search, width: 80 }} />
                </div>
              </>
            ) : (
              <>
                <div style={{ fontSize: 13, color: "#777", marginBottom: 4 }}>{client.plan}</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8 }}>
                  <span style={{ fontSize: 32, fontWeight: 800, fontFamily: "'Oswald',sans-serif" }}>{client.planUsed}</span>
                  <span style={{ color: "#999" }}>/ {client.planTotal} used</span>
                  <span style={{ marginLeft: "auto", fontWeight: 700, color: left <= 2 ? "#b00020" : "#111", fontFamily: "'Oswald',sans-serif" }}>
                    {left <= 0 ? "EXPIRED" : `${left} LEFT`}
                  </span>
                </div>
                <Bar pct={client.planTotal ? (client.planUsed / client.planTotal) * 100 : 0} danger={left <= 2} />
                <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                  <button onClick={() => logSession(1)} style={primaryBtn}>＋ Log session</button>
                  <button onClick={() => logSession(-1)} style={ghostBtn}>－ Undo</button>
                </div>
              </>
            )}
          </Card>

          <Card title="Coach Notes">
            <textarea value={client.notes} onChange={(e) => onChange({ notes: e.target.value })}
              placeholder="General notes about this client…" style={textarea} />
          </Card>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          <Card title={`Key Working Areas · ${mastery.toFixed(0)}% mastery`}>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {SKILL_AREAS.map((area) => (
                <div key={area} style={skillRow}>
                  <span style={{ fontSize: 13.5 }}>{area}</span>
                  <Stars value={client.skills[area] || 0} onChange={(v) => setSkill(area, v)} />
                </div>
              ))}
            </div>
            <div style={{ fontSize: 11.5, color: "#999", marginTop: 12 }}>
              Tap the bars to rate 0–5. Higher rating = stronger command of the technique.
            </div>
          </Card>

          <Card title="Progress Log">
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              <input value={logText} onChange={(e) => setLogText(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addLog()}
                placeholder="Add a progress note…" style={{ ...search, flex: 1 }} />
              <button onClick={addLog} style={primaryBtn}>Add</button>
            </div>
            {client.log.length === 0 ? (
              <Empty>No log entries yet.</Empty>
            ) : (
              <div style={{ display: "flex", flexDirection: "column" }}>
                {client.log.map((e, i) => (
                  <div key={i} style={logRow}>
                    <span style={logDot} />
                    <div>
                      <div style={{ fontSize: 11, color: "#999", fontFamily: "'Oswald',sans-serif", letterSpacing: ".05em" }}>{e.date}</div>
                      <div style={{ fontSize: 13.5 }}>{e.text}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>

          <div style={{ marginTop: 4 }}>
            {!confirmDel ? (
              <button onClick={() => setConfirmDel(true)} style={dangerGhost}>Remove client</button>
            ) : (
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 13, color: "#b00020" }}>Permanently remove {client.name}?</span>
                <button onClick={onDelete} style={dangerBtn}>Yes, remove</button>
                <button onClick={() => setConfirmDel(false)} style={ghostBtn}>Cancel</button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ---- Reusable bits -----------------------------------------
function SectionTitle({ children }) {
  return <h2 style={{
    fontFamily: "'Oswald',sans-serif", fontSize: 14, letterSpacing: ".18em",
    textTransform: "uppercase", color: "#999", margin: "4px 0 16px", fontWeight: 600,
  }}>{children}</h2>;
}
function Card({ title, children }) {
  return <section style={card}><div style={cardTitle}>{title}</div>{children}</section>;
}
function Stat({ label, value, big, accent }) {
  return (
    <div style={{ ...statCard, gridColumn: big ? "span 1" : "auto" }}>
      <div style={{ fontSize: big ? 46 : 38, fontWeight: 800, fontFamily: "'Oswald',sans-serif", color: accent ? "#b00020" : "#111", lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 11.5, color: "#888", letterSpacing: ".08em", textTransform: "uppercase", marginTop: 8, fontWeight: 600 }}>{label}</div>
    </div>
  );
}
function Field({ label, value, editing, onChange }) {
  return (
    <div style={fieldRow}>
      <span style={fieldLabel}>{label}</span>
      {editing
        ? <input value={value} onChange={(e) => onChange(e.target.value)} style={{ ...search, width: 180 }} />
        : <span style={{ fontSize: 14 }}>{value || "—"}</span>}
    </div>
  );
}
function Empty({ children }) {
  return <div style={{ color: "#aaa", fontSize: 13.5, padding: "8px 0" }}>{children}</div>;
}
const initials = (n) => (n || "?").split(" ").map((w) => w[0]).slice(0, 2).join("").toUpperCase();

const brandSub = { fontSize: 10.5, letterSpacing: ".22em", color: "#999", fontFamily: "'Oswald',sans-serif", marginTop: 2 };
const navBtn = (on) => ({ fontFamily: "'Oswald',sans-serif", fontWeight: 600, fontSize: 13, letterSpacing: ".08em", textTransform: "uppercase", padding: "9px 18px", cursor: "pointer", border: "1.5px solid #111", borderRadius: 999, background: on ? "#111" : "transparent", color: on ? "#fff" : "#111", transition: "all .15s ease" });
const footer = { textAlign: "center", padding: "18px", fontSize: 12, color: "#aaa", borderTop: "1px solid #e2e2e2" };
const statGrid = { display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 };
const statCard = { background: "#fff", border: "1px solid #e6e6e8", borderRadius: 14, padding: "22px 20px" };
const card = { background: "#fff", border: "1px solid #e6e6e8", borderRadius: 14, padding: 18 };
const cardTitle = { fontFamily: "'Oswald',sans-serif", fontSize: 12.5, letterSpacing: ".12em", textTransform: "uppercase", color: "#888", fontWeight: 600, marginBottom: 14, paddingBottom: 10, borderBottom: "1px solid #eee" };
const cardGrid = { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14 };
const clientCard = { textAlign: "left", background: "#fff", border: "1px solid #e6e6e8", borderRadius: 14, padding: 18, cursor: "pointer", transition: "transform .15s ease, box-shadow .15s ease", fontFamily: "'Inter',sans-serif", color: "#111" };
const avatar = { width: 42, height: 42, borderRadius: "50%", background: "#111", color: "#fff", display: "grid", placeItems: "center", fontFamily: "'Oswald',sans-serif", fontWeight: 700, fontSize: 15, flexShrink: 0 };

const dangerGhost = { ...ghostBtn, color: "#b00020", borderColor: "#e0b4bb", fontSize: 12 };

const fieldLabel = { fontSize: 12.5, color: "#999", letterSpacing: ".04em" };
const textarea = { width: "100%", minHeight: 90, padding: "10px 12px", border: "1.5px solid #ddd", borderRadius: 8, fontFamily: "'Inter',sans-serif", fontSize: 13.5, resize: "vertical", outline: "none" };

const attentionRow = { display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", background: "#fafafa", border: "1px solid #eee", borderRadius: 10, padding: "12px 14px", marginBottom: 8, cursor: "pointer", textAlign: "left", fontFamily: "'Inter',sans-serif", color: "#111" };
const logRow = { display: "flex", gap: 12, padding: "10px 0", borderBottom: "1px solid #f4f4f4" };
const logDot = { width: 8, height: 8, borderRadius: "50%", background: "#111", marginTop: 6, flexShrink: 0 };
