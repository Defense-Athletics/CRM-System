function useIsMobile(breakpoint = 720) {
  const [mobile, setMobile] = useState(
    typeof window !== "undefined" ? window.innerWidth <= breakpoint : false
  );
  useEffect(() => {
    const onResize = () => setMobile(window.innerWidth <= breakpoint);

    return () => window.removeEventListener("resize", onResize);

// ---- Date / week helpers -----------------------------------
// Local-date "YYYY-MM-DD" (NOT UTC) so dates match the user's actual
// calendar day — important for Dubai (UTC+4) and other +offsets.
const ymd = (d) => {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
};
const todayStr = () => ymd(new Date());

// ---- Membership engine -------------------------------------
// A membership is modelled as:
//   plan        : "2x / week" | "3x / week" | "Unlimited"
//   cycleStart  : "YYYY-MM-DD" — when the current monthly cycle began
//   frozenDays  : integer — total days currently frozen in this cycle
//   freezeStart : "YYYY-MM-DD" | null — if currently frozen, when it began
//   attended    : integer — sessions actually attended this cycle (from register)
// Sessions remaining are CALCULATED live: start full, count down per full
// week elapsed since cycleStart (excluding frozen time). No background job.

const MS_DAY = 86400000;
function daysBetween(aStr, bStr) {
  return Math.floor((new Date(bStr + "T00:00:00") - new Date(aStr + "T00:00:00")) / MS_DAY);
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return ymd(d);
}

// Effective elapsed days in the cycle, excluding frozen time (including an
// in-progress freeze up to today).
function effectiveElapsedDays(m, today) {
  if (!m.cycleStart) return 0;
  let frozen = m.frozenDays || 0;
  if (m.freezeStart) frozen += Math.max(0, daysBetween(m.freezeStart, today));
  const raw = Math.max(0, daysBetween(m.cycleStart, today));
  return Math.max(0, raw - frozen);
}

// Full weeks elapsed (0..CYCLE_WEEKS), used for the count-down.
function weeksElapsed(m, today) {
  return Math.min(CYCLE_WEEKS, Math.floor(effectiveElapsedDays(m, today) / 7));
}

// Package sessions remaining this cycle for a deducting plan.
function sessionsRemaining(client, today) {
  const plan = PLANS[client.plan];
  if (!plan || plan.unlimited) return null; // unlimited → no remaining concept
  const used = weeksElapsed(client, today) * plan.weekly;
  return Math.max(0, plan.perCycle - used);
}

// The cycle's renewal (end) date, pushed out by any frozen days.
function renewalDate(client) {
  if (!client.cycleStart) return null;
  const base = addDays(client.cycleStart, CYCLE_WEEKS * 7);
  let frozen = client.frozenDays || 0;
  if (client.freezeStart) frozen += Math.max(0, daysBetween(client.freezeStart, todayStr()));
  return addDays(base, frozen);
}

// Monday-start week containing the given date.
function startOfWeek(date) {
  const d = new Date(date);
  const day = (d.getDay() + 6) % 7; // 0 = Monday
  d.setDate(d.getDate() - day);
  d.setHours(0, 0, 0, 0);
  return d;
}
// The seven dates (Mon..Sun) of the week containing `anchor` (a Date).
function weekDates(anchor) {
  const start = startOfWeek(anchor);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return d;
  });
}

  return (data || []).map((row) => row.data);

  if (error) console.error("save failed", error);
}

  if (error) { console.error("attendance load failed", error); return []; }
  return (data && data.client_ids) ? data.client_ids : [];
}

  const map = {};
  (data || []).forEach((r) => { map[r.occ_id] = r.client_ids || []; });

        </label>
        <label style={{ display: "flex", gap: 10, alignItems: "flex-start", marginTop: 10, cursor: "pointer" }}>
          <input type="checkbox" checked={coachAck} onChange={(e) => setCoachAck(e.target.checked)} style={{ marginTop: 3, width: 18, height: 18, accentColor: "#d4af37" }} />
          <span style={{ fontSize: 13 }}>The <strong>coach</strong> confirms they have explained the PAR-Q and waiver to the client.</span>
        </label>

        <div style={{ display: "flex", gap: 8, marginTop: 20, alignItems: "center" }}>
          <button onClick={submit} style={{ ...primaryBtn, opacity: ready ? 1 : 0.45 }}>Create Client</button>
          <button onClick={onCancel} style={ghostBtn}>Cancel</button>
          {!ready && (
            <span style={{ fontSize: 11.5, color: "#9a9a98", marginLeft: "auto" }}>
              {!allAnswered ? "Answer all questions" : "Both boxes must be ticked"}
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
//  MAIN APP
// ============================================================
function App() {
  const [authed, setAuthed] = useState(false);
  const isMobile = useIsMobile();
  const [roster, setRoster] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [loadError, setLoadError] = useState(null);
  const [view, setView] = useState("dashboard");
  const [activeId, setActiveId] = useState(null);
  const [query, setQuery] = useState("");
  const [filterLevel, setFilterLevel] = useState("All");
  const [editing, setEditing] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [showParq, setShowParq] = useState(false);

  // Initial load from the shared database (after login)
  useEffect(() => {
    if (!authed) return;
    (async () => {
      try {
        let data = await dbLoadAll();
        if (!data || data.length === 0) {
          // First ever run: seed the shared database once.
          for (const c of SEED) await dbUpsertClient(c);
          data = SEED;
        }
        setRoster(data);
        setLoaded(true);
      } catch (e) {
        setLoadError("Could not reach the database. Check your internet connection and refresh.");
      }
    })();
  }, [authed]);

  // Light polling so coaches see each other's changes (every 12s).
  // Skipped while a profile is open for editing to avoid clobbering typing.
  useEffect(() => {
    if (!authed || !loaded) return;
    const t = setInterval(async () => {
      if (editing) return;
      try {
        const data = await dbLoadAll();
        setRoster(data);
      } catch (e) { /* transient network issue; ignore */ }
    }, 12000);
    return () => clearInterval(t);
  }, [authed, loaded, editing]);

  const active = roster.find((c) => c.id === activeId) || null;

  // Update local state immediately (snappy UI) + persist that client to DB.
  function updateClient(id, patch) {
    setRoster((r) => {
      const next = r.map((c) => (c.id === id ? { ...c, ...patch } : c));
      const changed = next.find((c) => c.id === id);
      if (changed) {
        setSyncing(true);
        dbUpsertClient(changed).finally(() => setSyncing(false));
      }
      return next;
    });
  }
  function addClient() {
    // Require PAR-Q completion before the client is created.
    setShowParq(true);
  }
  function completeAddClient(parq) {
    const c = newClient({ name: "New Client", parq });
    setRoster((r) => [c, ...r]);
    dbUpsertClient(c);
    setShowParq(false);
    setActiveId(c.id);
    setView("profile");
    setEditing(true);
  }
  function deleteClient(id) {
    setRoster((r) => r.filter((c) => c.id !== id));
    dbDeleteClient(id);
    setView("clients");
    setActiveId(null);
  }

  const filtered = useMemo(() => {
    return roster
      .filter((c) => filterLevel === "All" || c.level === filterLevel)
      .filter((c) => c.name.toLowerCase().includes(query.toLowerCase()))
      .sort((a, b) => a.name.localeCompare(b.name));
  }, [roster, query, filterLevel]);

  // ---- Password gate ----
  if (!authed) {
    return <Gate onUnlock={() => setAuthed(true)} />;
  }

  if (loadError) {
    return (
      <div style={{ ...wrap, display: "grid", placeItems: "center", minHeight: 400 }}>
        <div style={{ textAlign: "center", color: "#e23b3b", fontFamily: "'Inter',sans-serif", maxWidth: 360, padding: 20 }}>
          <Logo size={56} />
          <div style={{ marginTop: 16, fontWeight: 600 }}>{loadError}</div>
          <button onClick={() => window.location.reload()} style={{ ...primaryBtn, marginTop: 16 }}>Retry</button>
        </div>
      </div>
    );
  }

  if (!loaded) {
    return (
      <div style={{ ...wrap, display: "grid", placeItems: "center", minHeight: 400 }}>
        <div style={{ textAlign: "center", color: "#9a9a98", fontFamily: "'Oswald',sans-serif", letterSpacing: ".1em" }}>
          <Logo size={56} />
          <div style={{ marginTop: 12 }}>LOADING ROSTER…</div>
        </div>
      </div>
    );
  }

  return (
    <div style={wrap}>
      <header style={{ ...header, flexDirection: isMobile ? "column" : "row", alignItems: isMobile ? "stretch" : "center", gap: isMobile ? 12 : 0, padding: isMobile ? "14px 16px" : "18px 26px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, justifyContent: isMobile ? "center" : "flex-start" }}>
          <Logo size={isMobile ? 38 : 46} />
          <div>
            <div style={{ ...brandTitle, fontSize: isMobile ? 16 : 18 }}>DEFENCE &amp; ATHLETICS</div>
            <div style={brandSub}>CLIENT PROGRESS CRM · DUBAI</div>
          </div>
        </div>
        <nav style={{
          display: "flex", gap: 6,
          justifyContent: isMobile ? "flex-start" : "flex-end",
          overflowX: isMobile ? "auto" : "visible",
          paddingBottom: isMobile ? 2 : 0,
          WebkitOverflowScrolling: "touch",
        }}>
          {[["dashboard", "Dashboard"], ["clients", "Clients"], ["classes", "Classes"], ["oneToOnes", "1-1 Sessions"]].map(([k, label]) => (
            <button key={k} onClick={() => { setView(k); setActiveId(null); }}
              style={{ ...navBtn(view === k), padding: isMobile ? "8px 13px" : "9px 18px", fontSize: isMobile ? 12 : 13, whiteSpace: "nowrap", flexShrink: 0 }}>
              {label}
            </button>
          ))}
        </nav>
      </header>

      <main style={{ padding: isMobile ? "16px 14px 40px" : "22px 26px 40px" }}>
        {view === "dashboard" && <Dashboard roster={roster} isMobile={isMobile} go={(id) => { setActiveId(id); setView("profile"); }} />}
        {view === "clients" && (
          <ClientsView
            list={filtered} query={query} setQuery={setQuery} isMobile={isMobile}
            filterLevel={filterLevel} setFilterLevel={setFilterLevel}
            onOpen={(id) => { setActiveId(id); setView("profile"); setEditing(false); }}
            onAdd={addClient}
          />
        )}
        {view === "profile" && active && (
          <Profile
            client={active} editing={editing} setEditing={setEditing} isMobile={isMobile}
            onChange={(patch) => updateClient(active.id, patch)}
            onBack={() => { setView("clients"); setActiveId(null); }}
            onDelete={() => deleteClient(active.id)}
          />
        )}
        {view === "classes" && (
          <ClassesView
            roster={roster}
            onCheckIn={(clientId) => {
              const c = roster.find((x) => x.id === clientId);
              if (!c) return;
              updateClient(clientId, { attended: (c.attended || 0) + 1 });
            }}
            onCheckOut={(clientId) => {
              const c = roster.find((x) => x.id === clientId);
              if (!c) return;
              updateClient(clientId, { attended: Math.max(0, (c.attended || 0) - 1) });
            }}
          />
        )}
        {view === "oneToOnes" && <OneToOnesView roster={roster} />}
      </main>

      <footer style={footer}>
        {syncing ? "Saving…" : "Saved to shared database"} · {roster.length} client{roster.length !== 1 ? "s" : ""} on roster · live across all devices
      </footer>

      {showParq && (
        <ParqDialog
          onCancel={() => setShowParq(false)}
          onComplete={(parq) => completeAddClient(parq)}
        />
      )}
    </div>
  );
}

// ============================================================
//  CLASSES + ATTENDANCE  (dated weekly view)
// ============================================================
function ClassesView({ roster, onCheckIn, onCheckOut }) {
  const [anchor, setAnchor] = useState(() => startOfWeek(new Date())); // Date = Monday of shown week
  const [openOcc, setOpenOcc] = useState(null); // { dateStr, time, name, day } or null
  const [counts, setCounts] = useState({});     // occ_id -> attendee count
  const today = todayStr();
  const now = new Date();

  // Has this class occurrence's start time already passed?
  function isSlotPast(dateStr, time) {
    const [h, m] = time.split(":").map(Number);
    const start = new Date(dateStr + "T00:00:00");
    start.setHours(h, m, 0, 0);
    return start.getTime() < now.getTime();
  }

  const days = weekDates(anchor); // 7 Date objects, Mon..Sun

  // Load attendee counts for every class in the shown week.
  function refreshCounts() {
    const occs = [];
    days.forEach((d) => {
      classesForDay(d.getDay()).forEach((c) => occs.push(occId(ymd(d), c.time)));
    });
    dbLoadAttendanceBatch(occs).then((map) => {
      const m = {};
      occs.forEach((o) => { m[o] = (map[o] || []).length; });
      setCounts(m);
    });
  }
  useEffect(() => { refreshCounts(); /* eslint-disable-next-line */ }, [anchor.getTime()]);

  function shiftWeek(delta) {
    const nd = new Date(anchor);
    nd.setDate(nd.getDate() + delta * 7);
    setAnchor(startOfWeek(nd));
    setOpenOcc(null);
  }

  if (openOcc) {
    return (
      <ClassRegister
        roster={roster}
        occ={openOcc}
        onBack={() => { setOpenOcc(null); refreshCounts(); }}
        onCheckIn={onCheckIn}
        onCheckOut={onCheckOut}
      />
    );
  }

  const weekStart = days[0], weekEnd = days[6];
  const sameMonth = weekStart.getMonth() === weekEnd.getMonth();
  const rangeLabel =
    `${weekStart.toLocaleDateString(undefined, { day: "numeric", month: sameMonth ? undefined : "short" })}` +
    ` – ${weekEnd.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" })}`;

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <SectionTitle>Class Schedule</SectionTitle>
        <div style={{ display: "flex", gap: 8, marginLeft: "auto", alignItems: "center" }}>
          <button onClick={() => shiftWeek(-1)} style={ghostBtn}>‹ Prev</button>
          <button onClick={() => { setAnchor(startOfWeek(new Date())); setOpenOcc(null); }} style={primaryBtn}>This week</button>
          <button onClick={() => shiftWeek(1)} style={ghostBtn}>Next ›</button>
        </div>
      </div>
      <div style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 600, color: "#555", letterSpacing: ".04em", marginBottom: 14 }}>
        Week of {rangeLabel}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {days.map((d) => {
          const dateStr = ymd(d);
          const isPast = dateStr < today;     // whole day has passed
          const isToday = dateStr === today;
          const slots = classesForDay(d.getDay());
          return (
            <div key={dateStr} style={{
              display: "flex", alignItems: "center", gap: 16,
              background: isPast ? "#121213" : "#161617",
              border: `1px solid ${isToday ? "#d4af37" : "#2c2c2e"}`,
              borderRadius: 12, padding: "14px 18px",
              opacity: isPast ? 0.85 : 1,
            }}>
              <div style={{ width: 84, flexShrink: 0 }}>
                <div style={{
                  fontFamily: "'Oswald',sans-serif", fontWeight: 700, fontSize: 16,
                  letterSpacing: ".06em", color: isPast ? "#6e6e6c" : "#f2f2f0", textTransform: "uppercase",
                }}>{DAY_NAMES[d.getDay()]}</div>
                <div style={{ fontSize: 12, color: isPast ? "#aaa" : "#999" }}>
                  {d.toLocaleDateString(undefined, { day: "numeric", month: "short" })}
                </div>
                {isToday && <div style={{ fontSize: 10, fontWeight: 700, color: "#d4af37", letterSpacing: ".08em", marginTop: 2 }}>TODAY</div>}
              </div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                {slots.length === 0 ? (
                  <span style={{ color: "#bbb", fontSize: 13 }}>No classes</span>
                ) : slots.map((c) => {
                  const oid = occId(dateStr, c.time);
                  const n = counts[oid];
                  const slotPast = isPast || isSlotPast(dateStr, c.time);
                  return (
                    <button
                      key={c.time}
                      onClick={() => setOpenOcc({ dateStr, time: c.time, name: c.name, day: d.getDay() })}
                      className="da-clientcard"
                      style={{
                        display: "flex", flexDirection: "column", alignItems: "center",
                        border: `1.5px solid ${slotPast ? "#3a3a3c" : "#d4af37"}`,
                        borderRadius: 10, background: slotPast ? "#161617" : "#1f1f21",
                        color: slotPast ? "#6e6e6c" : "#f2f2f0",
                        padding: "8px 16px", cursor: "pointer", minWidth: 96,
                      }}>
                      <span style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 700, fontSize: 19 }}>{c.time}</span>
                      <span style={{ fontSize: 10.5, color: slotPast ? "#aaa" : "#9a9a98", textTransform: "uppercase", letterSpacing: ".06em" }}>{c.name}</span>
                      <span style={{ fontSize: 10.5, marginTop: 3, color: slotPast ? "#6e6e6c" : "#d4af37", fontWeight: 600 }}>
                        {n ? `${n} attended` : "—"}
                      </span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ fontSize: 11.5, color: "#999", marginTop: 16 }}>
        Classes grey out once their start time has passed, but stay editable. Tap any class to take or
        amend its register — checking a client in logs one session against their plan.
      </div>
    </div>
  );
}

// Register for one dated class occurrence.
function ClassRegister({ roster, occ, onBack, onCheckIn, onCheckOut }) {
  const id = occId(occ.dateStr, occ.time);
  const [present, setPresent] = useState(null); // array of client ids
  const [query, setQuery] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    let alive = true;
    dbLoadAttendance(id).then((ids) => { if (alive) setPresent(ids); });
    return () => { alive = false; };
  }, [id]);

  function toggle(clientId) {
    if (!present) return;
    const isIn = present.includes(clientId);
    const next = isIn ? present.filter((x) => x !== clientId) : [...present, clientId];
    setPresent(next);
    setBusy(true);
    dbSaveAttendance(id, next).finally(() => setBusy(false));
    if (isIn) onCheckOut(clientId); else onCheckIn(clientId);
  }

  const d = new Date(occ.dateStr + "T00:00:00");
  const niceDate = `${DAY_FULL[occ.day]}, ${d.toLocaleDateString(undefined, { day: "numeric", month: "long", year: "numeric" })}`;
  const sorted = [...roster].sort((a, b) => a.name.localeCompare(b.name));
  const list = sorted.filter((c) => c.name.toLowerCase().includes(query.toLowerCase()));

  return (
    <div>
      <button onClick={onBack} style={backBtn}>← Back to schedule</button>

      <div style={profileHead}>
        <div>
          <div style={{ fontSize: 26, fontWeight: 800, fontFamily: "'Oswald',sans-serif" }}>
            {occ.time} · {occ.name}
          </div>
          <div style={{ fontSize: 12.5, color: "#9a9a98", marginTop: 4 }}>{niceDate}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 800, fontSize: 30 }}>
            {present === null ? "…" : present.length}
          </div>
          <div style={{ fontSize: 11, color: "#999", textTransform: "uppercase", letterSpacing: ".08em" }}>
            {busy ? "saving…" : "checked in"}
          </div>
        </div>
      </div>

      <input placeholder="Search clients…" value={query} onChange={(e) => setQuery(e.target.value)}
        style={{ ...search, width: "100%", marginBottom: 14 }} />

      {present === null ? (
        <Empty>Loading register…</Empty>
      ) : list.length === 0 ? (
        <Empty>No clients found. Add clients on the Clients tab first.</Empty>
      ) : (
        <div style={card}>
          {list.map((c) => {
            const isIn = present.includes(c.id);
            const rem = sessionsRemaining(c, todayStr()); // null for unlimited
            return (
              <div key={c.id} style={{ ...skillRow, cursor: "pointer" }} onClick={() => toggle(c.id)}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{
                    width: 24, height: 24, borderRadius: 6, flexShrink: 0,
                    border: `2px solid ${isIn ? "#d4af37" : "#4a4a4c"}`,
                    background: isIn ? "#d4af37" : "transparent",
                    display: "grid", placeItems: "center",
                  }}>
                    {isIn && (
                      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#0c0c0d" strokeWidth="3">
                        <path d="M5 13l4 4L19 7" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                    )}
                  </div>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14.5 }}>{c.name}</div>
                    <div style={{ fontSize: 11.5, color: (rem !== null && rem <= 2) ? "#e23b3b" : "#999" }}>
                      {c.plan}{rem === null ? "" : ` · ${rem <= 0 ? "needs renewal" : `${rem} left`}`}
                    </div>
                  </div>
                </div>
                <LevelBadge level={c.level} small />
              </div>
            );
          })}
        </div>
      )}

      <div style={{ fontSize: 11.5, color: "#999", marginTop: 12 }}>
        Checking a client in logs one session against their plan. Un-checking reverses it.
        Registers can be amended any time, including for past dates.
      </div>
    </div>
  );
}

function OneToOnesView({ roster }) {
  const [anchor, setAnchor] = useState(() => startOfWeek(new Date()));
  const [bookings, setBookings] = useState(null); // array | null while loading
  const [editId, setEditId] = useState(null);     // id being edited, or "new"
  const [form, setForm] = useState({ date: todayStr(), time: "12:00", with_who: "", note: "" });
  const [justBooked, setJustBooked] = useState(null); // { with_who, date, time } after a new booking
  const today = todayStr();
  const now = new Date();

  function refresh() {
    dbLoadOneToOnes().then((rows) => setBookings(rows));
  }
  useEffect(() => { refresh(); }, []);

  const days = weekDates(anchor);
  function shiftWeek(delta) {
    const nd = new Date(anchor); nd.setDate(nd.getDate() + delta * 7);
    setAnchor(startOfWeek(nd));
  }
  function openNew(dateStr) {
    setForm({ date: dateStr || today, time: "12:00", with_who: "", note: "" });
    setEditId("new");
  }
  function openEdit(b) {
    setForm({ date: b.date, time: b.time, with_who: b.with_who || "", note: b.note || "", paid: !!b.paid });
    setEditId(b.id);
  }
  function togglePaid(b) {
    const updated = { ...b, paid: !b.paid };
    setBookings((bs) => (bs || []).map((x) => (x.id === b.id ? updated : x)));
    dbSaveOneToOne(updated).then(refresh);
  }
  function save() {
    if (!form.with_who.trim()) return;
    const isNew = editId === "new";
    const existing = (bookings || []).find((x) => x.id === editId);
    const b = {
      id: isNew ? Math.random().toString(36).slice(2, 9) : editId,
      date: form.date, time: form.time, with_who: form.with_who.trim(), note: form.note.trim(),
      paid: isNew ? false : !!(existing && existing.paid),
    };
    // optimistic update
    setBookings((bs) => {
      const others = (bs || []).filter((x) => x.id !== b.id);
      return [...others, b];
    });
    dbSaveOneToOne(b).then(refresh);
    setEditId(null);
    if (isNew) setJustBooked({ with_who: b.with_who, date: b.date, time: b.time });
  }
  function remove(id) {
    setBookings((bs) => (bs || []).filter((x) => x.id !== id));
    dbDeleteOneToOne(id).then(refresh);
    setEditId(null);
  }

  const weekStart = days[0], weekEnd = days[6];
  const rangeLabel =
    `${weekStart.toLocaleDateString(undefined, { day: "numeric", month: "short" })} – ` +
    `${weekEnd.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" })}`;

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <SectionTitle>1-1 Sessions</SectionTitle>
        <div style={{ display: "flex", gap: 8, marginLeft: "auto", alignItems: "center" }}>
          <button onClick={() => openNew(today)} style={primaryBtn}>+ Book 1-1</button>
          <button onClick={() => shiftWeek(-1)} style={ghostBtn}>‹ Prev</button>
          <button onClick={() => setAnchor(startOfWeek(new Date()))} style={ghostBtn}>This week</button>
          <button onClick={() => shiftWeek(1)} style={ghostBtn}>Next ›</button>
        </div>
      </div>
      <div style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 600, color: "#9a9a98", letterSpacing: ".04em", marginBottom: 14 }}>
        Week of {rangeLabel}
      </div>

      {justBooked && (
        <div style={{
          background: "#2a2410", border: "1.5px solid #d4af37", borderRadius: 12,
          padding: "14px 16px", marginBottom: 16, display: "flex", alignItems: "center",
          gap: 12, flexWrap: "wrap",
        }}>
          <span style={{ fontSize: 22 }}>💳</span>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontFamily: "'Oswald',sans-serif", fontWeight: 700, color: "#d4af37", letterSpacing: ".03em" }}>
              SEND PAYMENT LINK — 250 AED
            </div>
            <div style={{ fontSize: 13, color: "#f2f2f0", marginTop: 2 }}>
              1-1 booked with <strong>{justBooked.with_who}</strong> on {justBooked.date} at {justBooked.time}.
              Send them a Ziina payment link for <strong>250 AED</strong> to confirm the session.
            </div>
          </div>
          <button onClick={() => setJustBooked(null)} style={ghostBtn}>Got it</button>
        </div>
      )}

      {bookings === null ? (
        <Empty>Loading 1-1 sessions…</Empty>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {days.map((d) => {
            const dateStr = ymd(d);
            const isPast = dateStr < today;
            const isToday = dateStr === today;
            const dayBookings = bookings
              .filter((b) => b.date === dateStr)
              .sort((a, b) => a.time.localeCompare(b.time));
            return (
              <div key={dateStr} style={{
                display: "flex", gap: 16, alignItems: "flex-start",
                background: isPast ? "#121213" : "#161617",
                border: `1px solid ${isToday ? "#d4af37" : "#2c2c2e"}`,
                borderRadius: 12, padding: "14px 18px",

function CopyMessageButton({ text }) {
  const [copied, setCopied] = useState(false);
  function copy() {
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 2000); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallback());
    } else { fallback(); }
    function fallback() {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); done(); } catch (e) {}
      document.body.removeChild(ta);
    }
  }
  return (
    <button onClick={copy} style={{ ...ghostBtn, fontSize: 12, padding: "7px 12px", width: "100%" }}>
      {copied ? "✓ Copied — paste into WhatsApp" : "Copy renewal message"}
    </button>
  );
}

function Dashboard({ roster, go, isMobile }) {
  const today = todayStr();
  const total = roster.length;
  const byLevel = LEVELS.map((l) => ({ l, n: roster.filter((c) => c.level === l).length }));
  // Deducting members with 2 or fewer package sessions remaining → expiring soon.
  const expiring = roster
    .filter((c) => { const r = sessionsRemaining(c, today); return r !== null && r <= 2; })
    .sort((a, b) => sessionsRemaining(a, today) - sessionsRemaining(b, today));
  const frozenCount = roster.filter((c) => c.freezeStart).length;

  // Upcoming (today or later) 1-1 sessions that are NOT yet marked paid.
  const [unpaid, setUnpaid] = useState([]);
  useEffect(() => {
    dbLoadOneToOnes().then((rows) => {
      const up = (rows || [])
        .filter((b) => !b.paid && b.date >= today)
        .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
      setUnpaid(up);
    });
  }, []);

  const avgSkill =
    total === 0 ? 0 :
    roster.reduce((s, c) => {
      const v = Object.values(c.skills);
      return s + (v.reduce((a, b) => a + b, 0) / (v.length * 5));
    }, 0) / total * 100;

  return (
    <div>
      <SectionTitle>Overview</SectionTitle>
      <div style={{ ...statGrid, gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)" }}>
        <Stat big label="Active Clients" value={total} />
        <Stat label="Frozen Memberships" value={frozenCount} />

        <Stat label="Expiring Soon" value={expiring.length} accent={expiring.length > 0} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1.1fr 1fr", gap: 18, marginTop: 22 }}>
        <Card title="Level Distribution">
          {byLevel.map(({ l, n }) => (
            <div key={l} style={{ marginBottom: 14 }}>

                <LevelBadge level={l} small />

              </div>
              <Bar pct={total ? (n / total) * 100 : 0} />
            </div>
          ))}
        </Card>

        <Card title="Needs Action — Renewals &amp; Unpaid 1-1s">
          {expiring.length === 0 ? (
            <Empty>No memberships due for renewal.</Empty>
          ) : (
            expiring.map((c) => {
              const r = sessionsRemaining(c, today);
              const expiryDate = renewalDate(c);
              const msg =

                `Please use this link to renew your current package or if you want to upgrade, please let me know.\n\n` +

              return (
                <div key={c.id} style={{ ...attentionRow, flexDirection: "column", alignItems: "stretch", gap: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <button onClick={() => go(c.id)} style={{ background: "transparent", border: "none", textAlign: "left", cursor: "pointer", color: "#f2f2f0", padding: 0 }}>
                      <div style={{ fontWeight: 600 }}>{c.name}</div>

function Profile({ client, editing, setEditing, onChange, onBack, onDelete, isMobile }) {
  const [logText, setLogText] = useState("");
  const today = todayStr();
  const planInfo = PLANS[client.plan] || {};
  const rem = sessionsRemaining(client, today);     // null for unlimited
  const renew = renewalDate(client);
  const isFrozen = !!client.freezeStart;
  const mastery = Object.values(client.skills).reduce((a, b) => a + b, 0) / (SKILL_AREAS.length * 5) * 100;
  const [confirmDel, setConfirmDel] = useState(false);

  function setSkill(area, val) { onChange({ skills: { ...client.skills, [area]: val } }); }
  function addLog() {
    if (!logText.trim()) return;
    const entry = { date: todayStr(), text: logText.trim() };
    onChange({ log: [entry, ...client.log] });
    setLogText("");
  }
  function toggleFreeze() {
    if (isFrozen) {
      // Unfreeze: bank the frozen days into frozenDays, clear freezeStart.
      const banked = (client.frozenDays || 0) + Math.max(0, daysBetween(client.freezeStart, today));
      onChange({ frozenDays: banked, freezeStart: null });
    } else {
      onChange({ freezeStart: today });
    }
  }
  function renewCycle() {
    // Start a fresh monthly cycle today; reset frozen + attended counters.
    onChange({ cycleStart: today, frozenDays: 0, freezeStart: null, attended: 0 });

    <div>

          <Card title="Progress Log">
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              <input value={logText} onChange={(e) => setLogText(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addLog()}
                placeholder="Add a progress note…" style={{ ...search, flex: 1 }} />
              <button onClick={addLog} style={primaryBtn}>Add</button>
            </div>
            {client.log.length === 0 ? (
              <Empty>No log entries yet.</Empty>
            ) : (
              <div style={{ display: "flex", flexDirection: "column" }}>
                {client.log.map((e, i) => (
                  <div key={i} style={logRow}>
                    <span style={logDot} />
                    <div>
                      <div style={{ fontSize: 11, color: "#999", fontFamily: "'Oswald',sans-serif", letterSpacing: ".05em" }}>{e.date}</div>
                      <div style={{ fontSize: 13.5 }}>{e.text}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>

          <div style={{ marginTop: 4 }}>
            {!confirmDel ? (
              <button onClick={() => setConfirmDel(true)} style={dangerGhost}>Remove client</button>
            ) : (
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 13, color: "#e23b3b" }}>Permanently remove {client.name}?</span>
                <button onClick={onDelete} style={dangerBtn}>Yes, remove</button>
                <button onClick={() => setConfirmDel(false)} style={ghostBtn}>Cancel</button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ---- Reusable bits -----------------------------------------
function SectionTitle({ children }) {
  return <h2 style={{
    fontFamily: "'Oswald',sans-serif", fontSize: 14, letterSpacing: ".18em",
    textTransform: "uppercase", color: "#999", margin: "4px 0 16px", fontWeight: 600,
  }}>{children}</h2>;
}
function Card({ title, children }) {
  return <section style={card}><div style={cardTitle}>{title}</div>{children}</section>;
}
function Stat({ label, value, big, accent }) {
  return (
    <div style={{ ...statCard, gridColumn: big ? "span 1" : "auto" }}>
      <div style={{ fontSize: big ? 46 : 38, fontWeight: 800, fontFamily: "'Oswald',sans-serif", color: accent ? "#e23b3b" : "#d4af37", lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 11.5, color: "#9a9a98", letterSpacing: ".08em", textTransform: "uppercase", marginTop: 8, fontWeight: 600 }}>{label}</div>
    </div>
  );
}
function Field({ label, value, editing, onChange }) {
  return (
    <div style={fieldRow}>
      <span style={fieldLabel}>{label}</span>
      {editing
        ? <input value={value} onChange={(e) => onChange(e.target.value)} style={{ ...search, width: 180 }} />
        : <span style={{ fontSize: 14 }}>{value || "—"}</span>}
    </div>
  );
}
function Empty({ children }) {
  return <div style={{ color: "#aaa", fontSize: 13.5, padding: "8px 0" }}>{children}</div>;
}
const initials = (n) => (n || "?").split(" ").map((w) => w[0]).slice(0, 2).join("").toUpperCase();
